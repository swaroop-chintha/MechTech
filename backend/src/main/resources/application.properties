server.port=8080

# MySQL Connection Details
spring.datasource.url=jdbc:mysql://localhost:3306/MechTech_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Options
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Redis Configuration (Fallback to local, override with ENV vars if needed)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT Properties
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1hbmQtc3Ryb25nLWp3dC1zZWNyZXQta2V5LTMyeC1jaGFyYWN0ZXJzLWxvbmc=}
app.jwt.expiration-ms=86400000

# MSG91 OTP API Configuration
app.msg91.authkey=${MSG91_AUTH_KEY:mock_auth_key}
app.msg91.template-id=${MSG91_TEMPLATE_ID:mock_template_id}
